spring:
  application:
    name: template-base
  profiles:
    default: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s
  mvc:
    problemdetails:
      enabled: true
  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
