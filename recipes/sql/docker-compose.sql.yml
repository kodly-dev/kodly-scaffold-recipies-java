# Local PostgreSQL for template-base.
# Usage: docker compose -f docker-compose.sql.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: template-base
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d template-base"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
