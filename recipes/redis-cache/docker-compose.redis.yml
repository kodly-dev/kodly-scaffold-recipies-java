# Local Redis for template-base.
# Usage: docker compose -f docker-compose.redis.yml up -d
# Stack with SQL or Mongo: docker compose -f docker-compose.sql.yml -f docker-compose.redis.yml up -d
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
